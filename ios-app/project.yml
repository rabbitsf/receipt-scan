name: ReceiptTracker
options:
  bundleIdPrefix: com.webreceipt
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  ReceiptTracker:
    type: application
    platform: iOS
    sources:
      - path: ReceiptTracker
    info:
      path: ReceiptTracker/Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: "Receipt Tracker uses the camera to photograph receipts so their details can be scanned automatically."
        NSPhotoLibraryAddUsageDescription: "Receipt Tracker can save a receipt photo to your Photos library when you choose Save to Photos."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.webreceipt.ReceiptTracker
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: true
  ReceiptTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ReceiptTrackerUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.webreceipt.ReceiptTrackerUITests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: ReceiptTracker
    dependencies:
      - target: ReceiptTracker
  ReceiptTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReceiptTrackerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.webreceipt.ReceiptTrackerTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ReceiptTracker.app/ReceiptTracker"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: ReceiptTracker
schemes:
  ReceiptTracker:
    build:
      targets:
        ReceiptTracker: all
        ReceiptTrackerUITests: [test]
        ReceiptTrackerTests: [test]
    test:
      targets:
        - ReceiptTrackerUITests
        - ReceiptTrackerTests
